name: Upload Template to GCS

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  upload-template:
    runs-on: ubuntu-latest

    environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}

    permissions:
      contents: read
      id-token: write

    env:
      TEMPLATE_NAME: base-template.zip

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Zip template
        run: |
          zip -r $TEMPLATE_NAME . \
            -x ".git/*" \
            -x "node_modules/*" \
            -x ".gitignore" \
            -x ".next/*" \
            -x "gha-creds-*" \
            -x ".github/*"

      - name: Upload to GCS
        run: |
          gsutil -m cp $TEMPLATE_NAME gs://${{ vars.GCS_BUCKET }}/$TEMPLATE_NAME
